server:
    port: 8081

spring:
    application:
        name: auth-service
    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/codesync_auth_db?createDatabaseIfNotExist=true
        username: ${DB_USER:root}
        password: ${DB_PASSWORD:password}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

eureka:
    client:
        service-url:
            defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    instance:
        prefer-ip-address: true

# Monitoring for Admin Server
management:
    endpoints:
        web:
            exposure:
                include: "health,info,metrics,env"
    endpoint:
        health:
            show-details: always
jwt:
    secret: ${JWT_SECRET}
    expiry: ${TOKEN_EXPIRY:86400000}
springdoc:
    api-docs:
        path: /v3/api-docs
        swagger-ui:
            path:
                /swagger-ui.html
                # This tells Swagger to use the Gateway URL for its requests
        server:
            url: http://localhost:9000
