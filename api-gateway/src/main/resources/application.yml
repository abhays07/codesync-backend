server:
    port: 9000

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.http.server.reactive: INFO
    org.springframework.web.reactive: INFO
    reactor.netty.http.server: INFO

spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            # --- CORS Configuration ---
            server:
                webflux:
                    globalcors:
                        add-to-simple-url-handler-mapping: true
                        cors-configurations:
                            "[/**]":
                                allowedOriginPatterns: "*"
                                allowedMethods:
                                    ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
                                allowedHeaders: "*"
                                allowCredentials: true

                    # --- HTTP Client Timeouts ---
                    httpclient:
                        connect-timeout: 10000
                        response-timeout: 30s

                    discovery:
                        locator:
                            enabled: true
                            lower-case-service-id: true

                    routes:
                        - id: auth-service
                          uri: lb://auth-service
                          predicates:
                              - Path=/api/v1/auth/**

                        - id: project-service
                          uri: lb://project-service
                          predicates:
                              - Path=/api/v1/projects/**

                        - id: file-service
                          uri: lb://file-service
                          predicates:
                              - Path=/api/v1/files/**

                        - id: collab-service
                          uri: lb://collab-service
                          predicates:
                              - Path=/api/v1/sessions/**

                        - id: execution-service
                          uri: lb://execution-service
                          predicates:
                              - Path=/api/v1/executions/**

                        - id: comment-service
                          uri: lb://comment-service
                          predicates:
                              - Path=/api/v1/comments/**

                        - id: notification-service
                          uri: lb://notification-service
                          predicates:
                              - Path=/api/v1/notifications/**

                        - id: version-service
                          uri: lb://version-service
                          predicates:
                              - Path=/api/v1/versions/**

                        - id: notification-ws
                          uri: lb:ws://notification-service
                          predicates:
                              - Path=/ws-notifications/**

                        - id: collab-ws
                          uri: lb:ws://collab-service
                          predicates:
                              - Path=/ws-collab/**

                        - id: payment-service
                          uri: lb://payment-service
                          predicates:
                              - Path=/api/v1/payments/**

eureka:
    client:
        service-url:
            defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    instance:
        prefer-ip-address: true

springdoc:
    swagger-ui:
        urls:
            - name: "01. Auth Service"
              url: "/v3/api-docs/auth"
            - name: "02. Project Service"
              url: "/v3/api-docs/projects"
            - name: "03. Payment Service"
              url: "/v3/api-docs/payments"
