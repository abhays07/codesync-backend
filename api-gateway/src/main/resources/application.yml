server:
    port: 9000

spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            server:
                webflux:
                    discovery:
                        locator:
                            enabled: true
                            lower-case-service-id: true
                    globalcors:
                        cors-configurations:
                            "[/**]":
                                allowedOrigins: "http://localhost:5173"
                                allowedMethods: "*"
                                allowedHeaders: "*"
                                allowCredentials: true # MANDATORY for OAuth2 Handshake
            routes:
                - id: auth-service
                  uri: lb://auth-service
                  predicates:
                      - Path=/api/v1/auth/**
                - id: project-service
                  uri: lb://PROJECT-SERVICE
                  predicates:
                      - Path=/api/v1/projects/**
                - id: auth-openapi
                  uri: lb://auth-service
                  predicates:
                      - Path=/v3/api-docs/auth/**
                  filters:
                      - RewritePath=/v3/api-docs/auth/(?<segment>.*), /v3/api-docs/$\{segment}
                - id: project-openapi
                  uri: lb://PROJECT-SERVICE
                  predicates:
                      - Path=/v3/api-docs/projects/**
                  filters:
                      - RewritePath=/v3/api-docs/projects/(?<segment>.*), /v3/api-docs/$\{segment}

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: false
        hostname: localhost

management:
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: always

springdoc:
    swagger-ui:
        urls:
            - name: "Auth Service"
              url: "/v3/api-docs/auth"
            - name: "Project Service"
              url: "/v3/api-docs/projects"
