server:
    port: 8086 # Unique port for Version-Service

spring:
    application:
        name: version-service
    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/codesync_version_db?createDatabaseIfNotExist=true
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect # Updated to modern dialect
        open-in-view: false # Recommended for performance

# Service Discovery
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true

# Swagger / OpenAPI Configuration
springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html

# Monitoring for Admin Server
management:
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: always
