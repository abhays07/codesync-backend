server:
    port: 8088

spring:
    application:
        name: comment-service
    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/codesync_comment_db?createDatabaseIfNotExist=true
        username: ${DB_USER:root}
        password: ${DB_PASSWORD:password}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

eureka:
    client:
        service-url:
            defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    instance:
        prefer-ip-address: true

management:
    endpoints:
        web:
            exposure:
                include: "health,info"
