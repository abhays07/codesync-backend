server:
    port: 8084

spring:
    application:
        name: collab-service
    datasource:
        # My Sql Connectivity
        url: jdbc:mysql://${DB_HOST:localhost}:3306/codesync_collab_db?createDatabaseIfNotExist=true
        username: ${DB_USER:root}
        password: ${DB_PASSWORD:password}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

    boot:
        admin:
            client:
                url: http://localhost:9090/admin

eureka:
    client:
        service-url:
            defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    instance:
        prefer-ip-address: false
        hostname: localhost

management:
    endpoints:
        web:
            exposure:
                include: "health,info,metrics,env"
    endpoint:
        health:
            show-details: always

# Swagger Documentation
springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
