server:
    port: 8087

spring:
    application:
        name: notification-service
    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/codesync_notification_db?createDatabaseIfNotExist=true
        username: ${DB_USER:root}
        password: ${DB_PASSWORD:password}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

    mail:
        host: smtp.gmail.com
        port: 587
        username: ${EMAIL_USERNAME}
        password: ${EMAIL_APP_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                    # Crucial: 5s timeout to prevent thread blocking during SMTP outages
                    connectiontimeout: 5000
                    timeout: 5000
                    writetimeout: 5000

eureka:
    client:
        service-url:
            defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    instance:
        hostname: localhost

management:
    endpoints:
        web:
            exposure:
                include: "health,info"
    endpoint:
        mail:
            # Disabling health check for mail avoids slow startup if SMTP is unreachable
            enabled: false
